{% extends "base.html" %}
{% block title %}Register - Maurice's Easy Social{% endblock %}
{% block content %}
  <section class="auth-panel">
    <h1>Create account</h1>
    <form method="post" class="form-stack">
      <label>
        Username
        <input name="username" maxlength="40" autocomplete="username" required>
      </label>
      <label>
        Email
        <input name="email" type="email" autocomplete="email" required>
      </label>
      <label>
        Password
        <input name="password" type="password" autocomplete="new-password" required>
      </label>
      <div class="captcha-block">
        <div>
          <span class="captcha-label">CAPTCHA</span>
          <img class="captcha-image" src="{{ captcha.image_data_uri }}" alt="CAPTCHA challenge: {{ captcha.prompt }}">
        </div>
        <label>
          Enter the answer
          <input name="captcha_answer" inputmode="numeric" autocomplete="off" required>
        </label>
      </div>
      <button type="submit">Register</button>
    </form>
    <p class="muted">Already registered? <a href="{{ url_for('auth.login') }}">Log in</a>.</p>
  </section>
{% endblock %}

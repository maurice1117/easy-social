{% extends "base.html" %}
{% block title %}Log in - Maurice's Easy Social{% endblock %}
{% block content %}
  <section class="auth-panel">
    <h1>Log in</h1>
    <form method="post" class="form-stack">
      <label>
        Username or email
        <input name="username_or_email" autocomplete="username" required>
      </label>
      <label>
        Password
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <button type="submit">Log in</button>
    </form>
    <p class="muted">No account? <a href="{{ url_for('auth.register') }}">Create one</a>.</p>
  </section>
{% endblock %}
